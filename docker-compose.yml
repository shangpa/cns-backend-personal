version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: cns-mysql
    restart: always
    environment:
      MYSQL_DATABASE: cns
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: cns_user
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"

  app:
    build: .
    container_name: cns-app
    restart: always
    depends_on:
      - mysql
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/cns?serverTimezone=UTC&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: cns_user
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-validate}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SPRINGDOC_API_DOCS_ENABLED: "false"
      SPRINGDOC_SWAGGER_UI_ENABLED: "false"
    volumes:
      - ./uploads:/app/uploads
      - ./src/main/resources/gcp-key.json:/app/src/main/resources/gcp-key.json:ro
      - ./src/main/resources/firebase/serviceAccountKey.json:/app/src/main/resources/firebase/serviceAccountKey.json:ro
      - ./src/main/resources/api.properties:/app/src/main/resources/api.properties:ro

volumes:
  mysql-data:
